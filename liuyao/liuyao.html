// 日禄驿马桃花
const RILU = {"甲":"寅","乙":"卯","丙":"巳","丁":"午","戊":"巳","己":"午","庚":"申","辛":"酉","壬":"亥","癸":"子"};
const YIMA = {"申":"寅","寅":"申","巳":"亥","亥":"巳","子":"辰","丑":"未","卯":"酉","辰":"子","午":"寅","未":"丑","酉":"卯","戌":"丑"};

// 爻位地支配对规则
const YAO_DIZHI = [
  {yang:"子", yin:"未"}, // 1爻 初爻
  {yang:"寅", yin:"巳"}, // 2爻 二爻
  {yang:"辰", yin:"卯"}, // 3爻 三爻

  {yang:"申", yin:"亥"}, // 5爻 五爻

// 地支五行
const DIZHI_WUXING = {"子":"水","丑":"土","寅":"木","卯":"木","辰":"土","巳":"火","午":"火","未":"土","申":"金","酉":"金","戌":"土","亥":"水"};
// 五行生克
const WUKE = {"木":"土","火":"金","土":"水","金":"木","水":"火"};
const WUSHENG = {"木":"火","火":"土","土":"金","金":"水","水":"木"};
// 五虎遁（年干推月干）
const WUHUDUN = {"甲":2,"己":2,"乙":4,"庚":4,"丙":6,"辛":6,"丁":8,"壬":8,"戊":0,"癸":0};
// 五鼠遁（日干推时干）
const WUSHUDUN = {"甲":0,"己":0,"乙":2,"庚":2,"丙":4,"辛":4,"丁":6,"壬":6,"戊":8,"癸":8};
// 二十四节气
const JIEQI = [

// ====================== ikun天文历干支计算（优先） ======================
// 调用 sxwnl/core.js 的 obb.mingLiBaZi() 获取精确四柱
function getSizhuFromSxwnl(year, month, day, hour) {
  try {
    // 检查 sxwnl 核心是否可用
    if (typeof obb === 'undefined' || !obb.mingLiBaZi) {
      console.log('sxwnl core not available, fallback to local');
      return null;
    }

    // 公历转儒略日
    var Y = year, M = month, D = day + (hour / 24.0);
    var a = Math.floor((14 - M) / 12);
    var y = Y + 4800 - a;
    var m = M + 12 * a - 3;
    var jd = D + Math.floor((153 * m + 2) / 5) + 365 * y + Math.floor(y / 4)
           - Math.floor(y / 100) + Math.floor(y / 400) - 32045;
    jd = jd - 0.5;

    // 调用天文历核心
    var ob = {};
    var J2000 = 2451545;
    var radd = Math.PI / 180;
    var lon = 120; // 东经120度（北京时间）
    obb.mingLiBaZi(jd - J2000, lon * radd, ob);

    // 返回四柱
    return {
      year: ob.bz_jn || '',   // 年柱
      month: ob.bz_jy || '',  // 月柱
      day: ob.bz_jr || '',    // 日柱
      hour: ob.bz_js || ''    // 时柱
    };
  } catch(e) {
    console.error('sxwnl error:', e);
    return null;
  }
}

// ====================== 本地公式法降级方案 ======================
// 1. 高氏日柱公式（本地降级，精度有限）
function getDayGanZhi(year, month, day) {
  let Y = year, M = month, D = day;
  // 1、2月按上一年13、14月处理
  if (M < 3) {
    Y--;
    M += 12;
  }
  const C = Math.floor(Y / 100); // 世纪数-1
  const y = Y % 100; // 年份后两位
  // 计算天干G、地支Z
  const G = 4*C + Math.floor(C/4) + 5*y + Math.floor(y/4) + Math.floor(3*(M+1)/5) + D - 3;
  const Z = 8*C + Math.floor(C/4) + 5*y + Math.floor(y/4) + Math.floor(3*(M+1)/5) + D + 7 + (M%2===0?6:0);
  // 天干：1=甲，2=乙...10=癸 → 转0-9索引
  const ganIdx = (G % 10 - 1 + 10) % 10;
  // 地支：1=子，2=丑...12=亥 → 转0-11索引
  const zhiIdx = (Z % 12 - 1 + 12) % 12;
  return {
    gan: TIANGAN[ganIdx],
    zhi: DIZHI[zhiIdx],
    full: TIANGAN[ganIdx] + DIZHI[zhiIdx],
    ganIdx,
    zhiIdx
  };
}

// 2. 年干支计算（立春分界）
function getYearGanZhi(year, month, day) {
  const springBegin = new Date(year, 1, 4); // 立春2月4日
  const current = new Date(year, month-1, day);
  const targetYear = current < springBegin ? year-1 : year;
  // 年干支公式
  const ganIdx = (targetYear - 4) % 10;
  const zhiIdx = (targetYear - 4) % 12;
  return {
    gan: TIANGAN[ganIdx],
    zhi: DIZHI[zhiIdx],
    full: TIANGAN[ganIdx] + DIZHI[zhiIdx]
  };
}

// 3. 月干支计算（节气分界，五虎遁）
function getMonthGanZhi(year, month, day) {
  const current = new Date(year, month-1, day);
  // 找到当前所在的节
  let jieIndex = 0;
  for (let i = 0; i < 24; i += 2) {
    const jie = JIEQI[i];
    const nextJie = JIEQI[(i+2)%24];
    const jieTime = new Date(year, jie.month-1, jie.day);
    const nextJieTime = new Date(nextJie.month > jie.month ? year : year+1, nextJie.month-1, nextJie.day);
    if (current >= jieTime && current < nextJieTime) {
      jieIndex = i/2;
      break;
    }
  }
  // 月支：寅月=0，卯月=1...丑月=11
  const zhiIdx = (jieIndex + 2) % 12;
  // 月干：五虎遁
  const yearGan = getYearGanZhi(year, month, day).gan;
  const baseGanIdx = WUHUDUN[yearGan];
  const ganIdx = (baseGanIdx + jieIndex) % 10;
  return {
    gan: TIANGAN[ganIdx],
    zhi: DIZHI[zhiIdx],
    full: TIANGAN[ganIdx] + DIZHI[zhiIdx]
  };
}

// 4. 时干支计算（五鼠遁）
function getHourGanZhi(dayGan, hour) {
  // 时支计算
  let zhiIdx = Math.floor((hour + 1) / 2) % 12;
  // 时干计算
  const baseGanIdx = WUSHUDUN[dayGan];
  const ganIdx = (baseGanIdx + zhiIdx) % 10;
  return {
    gan: TIANGAN[ganIdx],
    zhi: DIZHI[zhiIdx],
    full: TIANGAN[ganIdx] + DIZHI[zhiIdx]
  };
}

// 5. 旬空计算（精准）
function getXunKong(dayGan, dayZhi) {
  const ganIdx = TIANGAN.indexOf(dayGan);
  const zhiIdx = DIZHI.indexOf(dayZhi);
  // 计算旬首地支
  const xunShouZhi = (zhiIdx - ganIdx + 12) % 12;
  // 旬空为旬首后两位
  return [DIZHI[(xunShouZhi + 10) % 12], DIZHI[(xunShouZhi + 11) % 12]];
}

// 6. 农历日期简化计算（仅显示月日，满足基础需求）
function getNongLiDate(year, month, day) {
  const baseDate = new Date(2026, 1, 17); // 2026年春节
  const currentDate = new Date(year, month-1, day);
  const diffDays = Math.floor((currentDate - baseDate) / (1000*60*60*24));
  if (diffDays < 0) {
    return `${year-1}年 腊月${30+diffDays}日`;
  }
  const monthDays = [30,29,30,29,30,29,30,29,30,29,30,29];
  let currentMonth = 0;
  let remainingDays = diffDays;
  while (remainingDays >= monthDays[currentMonth]) {
    remainingDays -= monthDays[currentMonth];
    currentMonth++;
    if (currentMonth >= 12) break;
  }
  return `${year}年 ${NONG_LI_MONTH[currentMonth]}月${remainingDays+1}日`;
}

// ====================== 六爻核心逻辑 ======================
// 1. 世应计算
function getShiYing(upperLines, lowerLines) {
  const tianSame = upperLines[2] === lowerLines[2];
  const renSame = upperLines[1] === lowerLines[1];
  const diSame = upperLines[0] === lowerLines[0];

  if(tianSame && renSame && diSame) return {shi:6, ying:3};
  if(tianSame && !renSame && !diSame) return {shi:2, ying:5};
  if(!tianSame && renSame && diSame) return {shi:5, ying:2};
  if(diSame && !tianSame && !renSame) return {shi:4, ying:1};
  if(!diSame && tianSame && renSame) return {shi:1, ying:4};
  if(!tianSame && !renSame && !diSame) return {shi:3, ying:6};
  if(renSame && !tianSame && !diSame) return {shi:4, ying:1};
  if(!renSame && tianSame && diSame) return {shi:3, ying:6};
  return {shi:3, ying:6};
}

// 2. 六亲计算
function getLiuQin(guaWuxing, zhiWuxing) {
  if(guaWuxing === zhiWuxing) return "兄弟";
  if(WUKE[guaWuxing] === zhiWuxing) return "妻财";
  if(WUKE[zhiWuxing] === guaWuxing) return "官鬼";
  if(WUSHENG[guaWuxing] === zhiWuxing) return "子孙";
  if(WUSHENG[zhiWuxing] === guaWuxing) return "父母";
  return "兄弟";
}

// 3. 纳音五行与阴阳
function getNaYinInfo(gan, zhi) {
  const ganIdx = TIANGAN.indexOf(gan);
  const zhiIdx = DIZHI.indexOf(zhi);
  const jiaziIdx = (zhiIdx + 6 * ((ganIdx - zhiIdx + 12) % 12)) % 60;
  const ny = NAYIN[jiaziIdx];
  let wx = "土";
  if(ny.includes("金")) wx = "金";
  else if(ny.includes("木")) wx = "木";
  else if(ny.includes("水")) wx = "水";
  else if(ny.includes("火")) wx = "火";
  return {
    name: ny,
    wuxing: wx,
    isYang: jiaziIdx % 2 === 0
  };
}

// 4. 变卦计算（支持多动爻）
function getBianGua(upperGua, lowerGua, dongYaos) {
  if(!dongYaos || dongYaos.length === 0) return null;
  const upper = BAGUA.find(g => g.name === upperGua);
  const lower = BAGUA.find(g => g.name === lowerGua);
  let allLines = [...lower.lines, ...upper.lines];
  for(let d = 0; d < dongYaos.length; d++) {
    allLines[dongYaos[d] - 1] = 1 - allLines[dongYaos[d] - 1];
  }
  const newLowerLines = allLines.slice(0,3);
  const newUpperLines = allLines.slice(3,6);
  const newUpper = BAGUA.find(g => g.lines.join() === newUpperLines.join());
  const newLower = BAGUA.find(g => g.lines.join() === newLowerLines.join());
  return GUA64.find(g => g.u === newUpper.name && g.l === newLower.name);
}

// ====================== 页面交互 ======================
function initGuaSelect() {
  ["inp-upper-gua", "inp-lower-gua"].forEach(id => {
    const sel = document.getElementById(id);
    BAGUA.forEach(g => {
      const opt = document.createElement("option");
      opt.value = g.name;
      opt.textContent = g.name + "卦";
      sel.appendChild(opt);
    });
    sel.value = "乾";
  });
}

function setNow() {
  const now = new Date();
  document.getElementById("inp-year").value = now.getFullYear();
  document.getElementById("inp-month").value = now.getMonth() + 1;
  document.getElementById("inp-day").value = now.getDate();
  document.getElementById("inp-hour").value = now.getHours();
}

function paipanBtn() {
  try {
    // 1. 获取输入
    const year = parseInt(document.getElementById("inp-year").value);
    const month = parseInt(document.getElementById("inp-month").value);
    const day = parseInt(document.getElementById("inp-day").value);
    const hour = parseInt(document.getElementById("inp-hour").value);
    const upperGua = document.getElementById("inp-upper-gua").value;
    const lowerGua = document.getElementById("inp-lower-gua").value;
    // 获取选中的动爻（多选）
    const dongYaos = [];
    document.querySelectorAll('input[name="dongyao"]:checked').forEach(function(cb) {
      dongYaos.push(parseInt(cb.value));
    });

    // 2. 四柱干支计算（优先使用ikun天文历，降级本地公式法）
    let yearGZ, monthGZ, dayGZ, hourGZ;
    let useSxwnl = false;

    // 尝试使用 sxwnl 天文历
    const sxwnlSizhu = getSizhuFromSxwnl(year, month, day, hour);
    if (sxwnlSizhu && sxwnlSizhu.year && sxwnlSizhu.month && sxwnlSizhu.day && sxwnlSizhu.hour) {
      yearGZ = { gan: sxwnlSizhu.year.charAt(0), zhi: sxwnlSizhu.year.charAt(1), full: sxwnlSizhu.year };
      monthGZ = { gan: sxwnlSizhu.month.charAt(0), zhi: sxwnlSizhu.month.charAt(1), full: sxwnlSizhu.month };
      dayGZ = { gan: sxwnlSizhu.day.charAt(0), zhi: sxwnlSizhu.day.charAt(1), full: sxwnlSizhu.day };
      hourGZ = { gan: sxwnlSizhu.hour.charAt(0), zhi: sxwnlSizhu.hour.charAt(1), full: sxwnlSizhu.hour };
      useSxwnl = true;
      console.log('使用ikun天文历四柱:', sxwnlSizhu);
    } else {
      // 降级到本地公式法
      yearGZ = getYearGanZhi(year, month, day);
      monthGZ = getMonthGanZhi(year, month, day);
      dayGZ = getDayGanZhi(year, month, day);
      hourGZ = getHourGanZhi(dayGZ.gan, hour);
      console.log('使用本地公式法四柱');
    }

    // 3. 神煞计算
    const xunKong = getXunKong(dayGZ.gan, dayGZ.zhi);
    const riLu = RILU[dayGZ.gan];
    const yiMa = YIMA[dayGZ.zhi];
    const taoHua = TAOHUA[dayGZ.zhi];
    const zhuZaiShen = ZHUZAI[dayGZ.full] || ZHUZAI[dayGZ.gan];

    // 4. 主卦信息
    const mainGua = GUA64.find(g => g.u === upperGua && g.l === lowerGua);
    const guaGong = mainGua.g;
    const guaWuxing = BAGUA.find(g => g.name === guaGong).wuxing;
    const upper = BAGUA.find(g => g.name === upperGua);
    const lower = BAGUA.find(g => g.name === lowerGua);
    const shiYing = getShiYing(upper.lines, lower.lines);
    const allLines = [...lower.lines, ...upper.lines];
    const yaoList = [];
    for(let i=0; i<6; i++) {
      const isYang = allLines[i] === 1;
      const dizhi = isYang ? YAO_DIZHI[i].yang : YAO_DIZHI[i].yin;
      const tiangan = getHourGanZhi(dayGZ.gan, DIZHI.indexOf(dizhi)*2).gan;
      const nyInfo = getNaYinInfo(tiangan, dizhi);
      const shen12 = SHEN12[nyInfo.wuxing][nyInfo.isYang ? "yang" : "yin"];
      const liuQin = getLiuQin(guaWuxing, DIZHI_WUXING[dizhi]);
      const isDong = dongYaos.length > 0 && dongYaos.indexOf(i+1) !== -1;
      const isShi = (i+1) === shiYing.shi;
      const isYing = (i+1) === shiYing.ying;
      
      yaoList.push({
        index: i+1,
        isYang,
        tiangan,
        dizhi,
        fullGZ: tiangan + dizhi,
        shen12,
        liuQin,
        isDong,
        isShi,
        isYing
      });
    }

    // 5. 变卦信息
    const bianGua = getBianGua(upperGua, lowerGua, dongYaos);
    let bianYaoList = [];
    if(bianGua) {
      const bianUpper = BAGUA.find(g => g.name === bianGua.u);
      const bianLower = BAGUA.find(g => g.name === bianGua.l);
      const bianGuaWuxing = BAGUA.find(g => g.name === bianGua.g).wuxing;
      const bianShiYing = getShiYing(bianUpper.lines, bianLower.lines);
      const bianAllLines = [...bianLower.lines, ...bianUpper.lines];
      
      for(let i=0; i<6; i++) {
        const isYang = bianAllLines[i] === 1;
        const dizhi = isYang ? YAO_DIZHI[i].yang : YAO_DIZHI[i].yin;
        const tiangan = getHourGanZhi(dayGZ.gan, DIZHI.indexOf(dizhi)*2).gan;
        const nyInfo = getNaYinInfo(tiangan, dizhi);
        const shen12 = SHEN12[nyInfo.wuxing][nyInfo.isYang ? "yang" : "yin"];
        const liuQin = getLiuQin(bianGuaWuxing, DIZHI_WUXING[dizhi]);
        const isShi = (i+1) === bianShiYing.shi;
        const isYing = (i+1) === bianShiYing.ying;
        
        bianYaoList.push({
          index: i+1,
          isYang,
          tiangan,
          dizhi,
          fullGZ: tiangan + dizhi,
          shen12,
          liuQin,
          isShi,
          isYing
        });
      }
    }

    // 6. 渲染页面
    document.getElementById("info-gongli").textContent = `公历: ${year}年${month}月${day}日 ${hour}时36分`;
    document.getElementById("info-nongli").textContent = `农历: ${getNongLiDate(year, month, day)}`;
    document.getElementById("info-jieqi").textContent = `节气: ${JIEQI[2].name} ${year}-${JIEQI[2].month}-${JIEQI[2].day} ~ ${JIEQI[4].name} ${year}-${JIEQI[4].month}-${JIEQI[4].day}`;
    document.getElementById("info-sizhu").innerHTML = `四柱: <span class="hl">${yearGZ.full}</span>  <span class="hl">${monthGZ.full}</span>  <span class="hl">${dayGZ.full}</span>  <span class="hl">${hourGZ.full}</span> ${useSxwnl ? '<span style="color:#666;font-size:0.8em">（ikun天文历）</span>' : '<span style="color:#999;font-size:0.8em">（本地公式法）</span>'}`;
    document.getElementById("info-shensha").innerHTML = `旬空: <span class="hl">${xunKong[0]}</span><span class="hl">${xunKong[1]}</span>&nbsp;&nbsp;日禄: ${riLu}&nbsp;&nbsp;驿马: ${yiMa}&nbsp;&nbsp;桃花: ${taoHua}&nbsp;&nbsp;值神: ${zhuZaiShen}`;
    
    // 卦名
    let guaNameText = `${mainGua.n}[${guaGong}${guaWuxing}]`;
    if(bianGua) {
      guaNameText += `&nbsp;&nbsp;之&nbsp;&nbsp;${bianGua.n}[${bianGua.g}${BAGUA.find(g=>g.name===bianGua.g).wuxing}]`;
    }
    document.getElementById("gua-name").innerHTML = guaNameText;

    // 焦氏易林林辞（支持多动爻多变卦）
    showLinCi(mainGua.n, bianGua ? bianGua.n : null, dongYaos);

    // 主卦爻渲染
    let mainHtml = "";
    for(let i=5; i>=0; i--) {
      const yao = yaoList[i];
      const dongMark = yao.isDong ? (yao.isYang ? "O " : "X ") : "";
      const shiYingMark = yao.isShi ? " 世" : (yao.isYing ? " 应" : "");
      
      mainHtml += `<div class="yao-line">
        <div class="yao-shen">${yao.shen12}</div>
        <div class="yao-bar ${yao.isYang ? 'yang' : 'yin'}"></div>
        <div class="yao-info">
          ${dongMark ? `<span class="dong">${dongMark}</span>` : ""}
          ${yao.fullGZ} ${yao.liuQin}${shiYingMark}
        </div>
      </div>`;
    }
    document.getElementById("main-gua").innerHTML = mainHtml;

    // 变卦爻渲染
    let bianHtml = "";
    if(bianGua && bianYaoList.length>0) {
      for(let i=5; i>=0; i--) {
        const yao = bianYaoList[i];
        const shiYingMark = yao.isShi ? " 世" : (yao.isYing ? " 应" : "");
        
        bianHtml += `<div class="yao-line">
          <div class="yao-shen">${yao.shen12}</div>
          <div class="yao-bar ${yao.isYang ? 'yang' : 'yin'}"></div>
          <div class="yao-info">
            ${yao.fullGZ} ${yao.liuQin}${shiYingMark}
          </div>
        </div>`;
      }
    }
    document.getElementById("bian-gua").innerHTML = bianHtml;

    document.getElementById("result").classList.add("on");
    document.getElementById("result").scrollIntoView({behavior:"smooth"});

  } catch(e) {
    alert("排盘出错：" + e.message);
    console.error(e);
  }
}

// 页面加载初始化
window.onload = () => {
  initGuaSelect();
  setNow();
};

// ====================== 焦氏易林林辞查找 ======================
// 提取卦简称：乾为天→乾, 天风姤→姤, 风天小畜→小畜
function getGuaShort(n) {
  if (n.length >= 3 && n[1] === '为') return n.charAt(0);
  return n.slice(2);
}

function getLin(key) {
  if (typeof YILING === 'undefined') return null;
  return YILING[key] || null;
}

// 显示林辞（主卦名_变卦名，支持多动爻多变卦）
function showLinCi(zhuGua, bianGua, dongYaos) {
  var linDiv = document.getElementById('lin-lin');

  if (!bianGua || !dongYaos || dongYaos.length === 0) {
    linDiv.style.display = 'none';
    return;
  }

  var zhuShort = getGuaShort(zhuGua);
  var bianShort = getGuaShort(bianGua);
  var key = zhuShort + '_' + bianShort;
  var text = getLin(key);

  // 多动爻时列出所有单动爻的林辞
  var allText = '';
  if (dongYaos.length === 1) {
    // 单动爻：直接显示主之变的林辞
    if (text) {
      allText = '【' + zhuShort + ' 之 ' + bianShort + '】' + text;
    }
  } else {
    // 多动爻：显示每个动爻对应的林辞
    var upper = BAGUA.find(function(g){ return g.name === document.getElementById('inp-upper-gua').value; });
    var lower = BAGUA.find(function(g){ return g.name === document.getElementById('inp-lower-gua').value; });
    var allLines = [...lower.lines, ...upper.lines];
    var yaoNames = ['初','二','三','四','五','上'];
    for (var d = 0; d < dongYaos.length; d++) {
      var dyIdx = dongYaos[d] - 1;
      // 单独翻转此爻，查找对应的变卦和林辞
      var tempLines = [...allLines];
      tempLines[dyIdx] = 1 - tempLines[dyIdx];
      var nLower = tempLines.slice(0,3);
      var nUpper = tempLines.slice(3,6);
      var nU = BAGUA.find(function(g){ return g.lines.join() === nUpper.join(); });
      var nL = BAGUA.find(function(g){ return g.lines.join() === nLower.join(); });
      if (nU && nL) {
        var nGua64 = GUA64.find(function(g){ return g.u === nU.name && g.l === nL.name; });
        if (nGua64) {
          var nShort = getGuaShort(nGua64.n);
          var nKey = zhuShort + '_' + nShort;
          var nText = getLin(nKey);
          if (nText) {
            allText += '【' + zhuShort + ' 之 ' + nShort + '（' + yaoNames[dyIdx] + '爻动）】' + nText + '\n\n';
          }
        }
      }
    }
    // 末尾附上总变卦的林辞
    if (text) {
      allText += '【' + zhuShort + ' 之 ' + bianShort + '（全变）】' + text;
    }
  }

  if (allText) {
    var header = zhuShort + ' 之 ' + bianShort;
    if (dongYaos.length > 1) header += '（' + dongYaos.length + '爻动）';
    document.getElementById('lin-key').textContent = header;
    document.getElementById('lin-text').textContent = allText.trim();
    document.getElementById('lin-text').style.whiteSpace = 'pre-wrap';
    linDiv.style.display = 'block';
  } else {
    linDiv.style.display = 'none';
  }
}
